<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> <audio id="bgMusic" loop>
        <source src="cancion.mp3" type="audio/mpeg">
    </audio>

    <div id="screen1" class="screen active">
        <div class="container">
            <h1>Hola [Nombre] 💕</h1>
            <p>Presiona cualquier tecla o haz clic para comenzar...</p>
        </div>
    </div>

    <div id="screen2" class="screen">
        <div class="container">
            <h1 title="San Valentín">¿Quieres ser mi San Valentín? 💘</h1>
            <div class="buttons">
                <button class="yes" onclick="showScreen('screen3')">Sí 💖</button>
                <button class="no" id="noButton">No 😢</button>
            </div>
        </div>
    </div>

    <div id="screen3" class="screen">
        <div class="container" title="Gracias">
            <h1 class="big">¡Gracias por aceptar!💘</h1>
            <p>No sé qué nos depare el futuro, pero quiero vivirlo contigo. 💗</p>
            <p>Eres una persona increíble, te quiero mucho 💞</p>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
